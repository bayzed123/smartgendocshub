<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SmartGen</title>
    <meta name="description" content="Get in touch with the SmartGen team for support, feedback, or inquiries.">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js" defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9789336661158068" crossorigin="anonymous"></script>
    <style>
        .form-status {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-top: 1rem;
            display: none;
        }
        
        .form-status.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid #10b981;
        }
        
        .form-status.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <main class="container">
        <section class="tool-container" style="margin-top: 2rem;">
            <h1 style="margin-bottom: 1.5rem;">Contact Us</h1>
            <p style="margin-bottom: 2rem; color: var(--text-secondary);">
                Have questions, feedback, or need support? We'd love to hear from you. Fill out the form below or reach out directly via email.
            </p>

            <div class="contact-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-bottom: 2rem;">
                <div>
                    <h2 style="font-size: 1.2rem; margin-bottom: 1rem;">Direct Contact</h2>
                    <div style="margin-bottom: 1.5rem;">
                        <p style="font-weight: 600; margin-bottom: 0.25rem;">Official Email:</p>
                        <a href="mailto:cwb.agency@outlook.com" style="color: var(--primary); text-decoration: none;">cwb.agency@outlook.com</a>
                    </div>
                    <div>
                        <p style="font-weight: 600; margin-bottom: 0.25rem;">Developer Portfolio:</p>
                        <a href="https://www.sayadbayezid.com" target="_blank" rel="noopener noreferrer" style="color: var(--primary); text-decoration: none;">www.sayadbayezid.com</a>
                    </div>
                </div>

                <form id="contact-form">
                    <div class="form-group">
                        <label class="form-label" for="name">Your Name</label>
                        <input type="text" name="name" id="name" class="form-input" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" name="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="message">Message</label>
                        <textarea name="message" id="message" class="form-textarea" rows="5" placeholder="How can we help you?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    <div id="formStatus" class="form-status"></div>
                </form>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script>
        // Google Form Submission Handler
        const contactForm = document.getElementById('contact-form');
        const formStatus = document.getElementById('formStatus');
        
        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const name = document.getElementById('name').value;
                const message = document.getElementById('message').value;
                
                // Google Form entry IDs
                const formData = new FormData();
                formData.append('entry.1779859455', email);  // Email field
                formData.append('entry.835425584', name);    // Name field
                formData.append('entry.437028985', message); // Message field
                
                try {
                    // Submit to Google Form
                    const response = await fetch(
                        'https://docs.google.com/forms/d/e/1FAIpQLSfmuqUixSj2cZiaxGxRlkiGOQ-eDcFQjrK2CfaeRRqS3LIZug/formResponse',
                        {
                            method: 'POST',
                            body: formData,
                            mode: 'no-cors'
                        }
                    );
                    
                    // Show success message
                    formStatus.textContent = 'Thank you! Your message has been sent successfully.';
                    formStatus.className = 'form-status success';
                    formStatus.style.display = 'block';
                    
                    // Reset form
                    contactForm.reset();
                    
                    // Hide message after 5 seconds
                    setTimeout(() => {
                        formStatus.style.display = 'none';
                    }, 5000);
                } catch (error) {
                    console.error('Form submission error:', error);
                    formStatus.textContent = 'Error sending message. Please try again.';
                    formStatus.className = 'form-status error';
                    formStatus.style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
