name: Auto Changelog Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/changelog.json'
      - '.github/workflows/**'

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Commit Info
        id: commit_info
        run: |
          echo "TITLE=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "DESC=$(git log -1 --pretty=%b | tr -d '\n' | sed 's/"/\\"/g')" >> $GITHUB_OUTPUT
          echo "HASH=$(git log -1 --pretty=%h)" >> $GITHUB_OUTPUT

      - name: Update changelog.json
        run: |
          FILE="data/changelog.json"
          # Create file if it doesn't exist
          if [ ! -f "$FILE" ]; then echo "[]" > "$FILE"; fi
          
          # Prepare new entry with commit hash included
          NEW_ENTRY=$(jq -n \
            --arg title "${{ steps.commit_info.outputs.TITLE }}" \
            --arg date "${{ steps.commit_info.outputs.DATE }}" \
            --arg desc "${{ steps.commit_info.outputs.DESC }}" \
            --arg hash "${{ steps.commit_info.outputs.HASH }}" \
            '{title: $title, date: $date, commit_hash: $hash, description: (if $desc == "" then "Platform improvement and optimization." else $desc end)}')
          
          # Append to top of array
          jq ". = [$NEW_ENTRY] + ." "$FILE" > temp.json && mv temp.json "$FILE"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/changelog.json
          git commit -m "chore: update changelog [skip ci]" || exit 0
          git push