name: Global Link Scanner (Safe Blog Editor)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install required dependencies for bulletproof AST parsing
      - name: Install dependencies
        run: npm install glob axios cheerio remark-parse remark-stringify unified unist-util-visit

      - name: Run Smart Scanner
        run: node scripts/global-link-scanner.js

      - name: Commit ONLY blog-posts and README changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog-posts/ README.md
          git diff --cached --quiet || git commit -m "Auto-removed broken internal links & updated README alert"
          git push
