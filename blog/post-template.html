<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - SmartGen Blog</title>
    <meta name="description" content="{{description}}">
    
    <!-- Dynamic Open Graph Tags -->
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="{{image}}">
    <meta property="og:url" content="https://smartgentools.com/blog/{{slug}}/">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Article Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{title}}",
        "image": ["{{image}}"],
        "datePublished": "{{date}}",
        "author": [{
            "@type": "Person",
            "name": "Sayad Md Bayezid Hosan",
            "url": "https://smartgentools.com/about/"
        }],
        "publisher": {
            "@type": "Organization",
            "name": "SmartGen",
            "logo": {
                "@type": "ImageObject",
                "url": "https://smartgentools.com/assets/images/logo.png"
            }
        },
        "description": "{{description}}"
    }
    </script>

    <!-- Fonts & Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/blog.css">
    
    <!-- Scripts -->
    <script src="../../assets/js/app.js" defer></script>
    <script src="../../assets/js/blog.js" defer></script>
</head>
<body>
    <header id="main-header"></header>

    <main class="post-container">
        <article>
            <header class="post-header">
                <div class="post-meta">
                    <span>{{date}}</span>
                    <span>•</span>
                    <span>{{category}}</span>
                </div>
                <h1 class="post-title">{{title}}</h1>
            </header>

            <img src="{{image}}" alt="{{title}}" class="post-featured-image">

            <div id="post-content" class="post-content">
                {{content}}
            </div>
        </article>

        <!-- Related Posts Section -->
        <section id="related-posts-section" class="related-posts">
            <h2 class="related-posts-title">Related Posts</h2>
            <div id="related-posts-grid" class="blog-grid">
                <!-- Related posts will be injected by JS -->
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>
</body>
</html>
