name: Auto Sitemap Generator

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'

  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'

  workflow_dispatch:

# Prevent multiple workflow conflicts
concurrency:
  group: sitemap-update
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # <--- MUST REQUIRED to fetch git file history for dates

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Clean Sitemap
        run: |
          python << 'EOF'
          import os
          import subprocess
          from datetime import datetime
          import xml.etree.ElementTree as ET
          from xml.dom import minidom

          BASE_URL = "https://smartgentools.com"
          SITEMAP_FILE = "sitemap.xml"
          NAMESPACE = "http://www.sitemaps.org/schemas/sitemap/0.9"

          ET.register_namespace('', NAMESPACE)

          # Create URLSET root
          urlset = ET.Element(f'{{{NAMESPACE}}}urlset')

          # Store URLs uniquely
          unique_urls = {}

          # Default current date fallback
          current_date = datetime.utcnow().strftime('%Y-%m-%d')

          # Function to get the last modified date of a file from Git history
          def get_last_mod_date(file_path):
              try:
                  git_date = subprocess.check_output(
                      ['git', 'log', '-1', '--format=%Y-%m-%d', file_path]
                  ).decode('utf-8').strip()
                  return git_date if git_date else current_date
              except:
                  return current_date

          # Scan repository
          for current_root, dirs, files in os.walk('.'):

              # Ignore hidden directories
              dirs[:] = [
                  d for d in dirs
                  if not d.startswith('.')
              ]

              for file in files:

                  # Process only HTML files
                  if not file.endswith('.html'):
                      continue

                  # Ignore 404.html
                  if file == '404.html':
                      continue

                  full_path = os.path.join(current_root, file)
                  
                  # Get accurate last modified date for this specific file
                  file_mod_date = get_last_mod_date(full_path)

                  # Normalize path
                  relative_path = os.path.relpath(full_path, '.')
                  relative_path = relative_path.replace('\\', '/')

                  # -----------------------------
                  # CLEAN URL NORMALIZATION
                  # -----------------------------

                  # Homepage
                  if relative_path == 'index.html':
                      clean_url = f'{BASE_URL}/'
                      priority = '1.0'
                      changefreq = 'weekly'

                  # Convert folder/index.html → /folder/
                  elif relative_path.endswith('/index.html'):

                      folder_path = relative_path[:-11]

                      clean_url = f'{BASE_URL}/{folder_path}/'
                      priority = '0.8'
                      changefreq = 'weekly'

                  # Normal HTML pages
                  else:

                      html_path = relative_path[:-5]

                      clean_url = f'{BASE_URL}/{html_path}/'
                      priority = '0.8'
                      changefreq = 'weekly'

                  # -----------------------------
                  # STRICT DUPLICATE PREVENTION
                  # -----------------------------

                  normalized_url = clean_url.strip().rstrip('/') + '/'

                  # Skip if already exists
                  if normalized_url in unique_urls:
                      continue

                  unique_urls[normalized_url] = {
                      'loc': normalized_url,
                      'lastmod': file_mod_date,
                      'changefreq': changefreq,
                      'priority': priority
                  }

          # Sort URLs alphabetically
          sorted_urls = sorted(unique_urls.values(), key=lambda x: x['loc'])

          # Create XML entries
          for item in sorted_urls:

              url_element = ET.SubElement(
                  urlset,
                  f'{{{NAMESPACE}}}url'
              )

              loc_element = ET.SubElement(
                  url_element,
                  f'{{{NAMESPACE}}}loc'
              )
              loc_element.text = item['loc']

              lastmod_element = ET.SubElement(
                  url_element,
                  f'{{{NAMESPACE}}}lastmod'
              )
              lastmod_element.text = item['lastmod']

              changefreq_element = ET.SubElement(
                  url_element,
                  f'{{{NAMESPACE}}}changefreq'
              )
              changefreq_element.text = item['changefreq']

              priority_element = ET.SubElement(
                  url_element,
                  f'{{{NAMESPACE}}}priority'
              )
              priority_element.text = item['priority']

          # Generate pretty XML
          raw_xml = ET.tostring(
              urlset,
              encoding='utf-8'
          )

          parsed_xml = minidom.parseString(raw_xml)

          pretty_xml = parsed_xml.toprettyxml(
              indent='  ',
              encoding='utf-8'
          )

          # Remove blank lines
          pretty_xml_clean = b'\n'.join(
              line for line in pretty_xml.splitlines()
              if line.strip()
          )

          # Read old sitemap if exists
          old_content = b''
          if os.path.exists(SITEMAP_FILE):
              with open(SITEMAP_FILE, 'rb') as old_file:
                  old_content = old_file.read()

          # Skip writing if no changes
          if old_content == pretty_xml_clean:
              print('Sitemap already clean and up to date.')
              exit(0)

          # Save sitemap.xml
          with open(SITEMAP_FILE, 'wb') as sitemap_file:
              sitemap_file.write(pretty_xml_clean)

          print(f'Sitemap generated successfully with {len(sorted_urls)} unique URLs.')
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add sitemap.xml

          # Exit if no changes detected
          if git diff --cached --quiet; then
            echo "No sitemap changes detected."
            exit 0
          fi

          # Commit changes
          git commit -m "chore: auto-update sitemap.xml [skip ci]"

          # Pull latest changes safely
          git pull --rebase origin main

          # Push sitemap update
          git push origin main
