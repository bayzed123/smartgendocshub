name: Generate and Deploy SmartGen Docs

on:
  push:
    branches:
      - main
    # Only trigger workflow if docs, config, or the script are changed
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'generate_docs.py'
  workflow_dispatch: 

permissions:
  contents: write  
  pages: write     
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run SmartGen Script
        # Executes your custom SmartGen script
        run: python generate_docs.py

      - name: Commit Generated Docs
        # Commits ONLY the files inside the docs/ folder to protect the main project
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git commit -m "docs: auto-generate guidelines from SmartGen script" || echo "No changes to commit"
          git push

      - name: Build MkDocs Site
        run: mkdocs build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4