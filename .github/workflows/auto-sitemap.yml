name: Auto Sitemap Generator

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - 'blog-posts/**/*.md'

  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent multiple workflow conflicts
concurrency:
  group: sitemap-update
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install PyYAML

      - name: Generate Clean Sitemap
        run: |
          python << 'EOF'
          import os
          import re
          import yaml
          import subprocess
          from datetime import datetime
          import xml.etree.ElementTree as ET
          from xml.dom import minidom

          BASE_URL = "https://smartgentools.com"
          SITEMAP_FILE = "sitemap.xml"
          NAMESPACE = "http://www.sitemaps.org/schemas/sitemap/0.9"

          ET.register_namespace('', NAMESPACE)

          urlset = ET.Element(f'{{{NAMESPACE}}}urlset')
          unique_urls = {}

          # Fallback date (YYYY-MM-DD format without using percentage signs)
          current_date = datetime.utcnow().date().isoformat()

          def slugify(text):
              text = text.lower()
              text = re.sub(r'[^a-z0-9]+', '-', text)
              return text.strip('-')

          def get_git_lastmod(filepath):
              """Extracts real git commit date without using % formatting strings"""
              try:
                  git_log = subprocess.check_output(
                      ['git', 'log', '-1', '--date=short'],
                      stderr=subprocess.DEVNULL
                  ).decode('utf-8')
                  
                  # Search for "Date: YYYY-MM-DD"
                  match = re.search(r'Date:\s+(\d{4}-\d{2}-\d{2})', git_log)
                  if match:
                      return match.group(1)
              except Exception:
                  pass
              
              try:
                  mtime = os.path.getmtime(filepath)
                  return datetime.utcfromtimestamp(mtime).date().isoformat()
              except Exception:
                  return current_date

          for current_root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]

              for file in files:
                  full_path = os.path.join(current_root, file)
                  relative_path = os.path.relpath(full_path, '.')
                  relative_path = relative_path.replace('\\', '/')

                  if relative_path.startswith('blog-posts/') and file.endswith('.md'):
                      if file.lower() == 'readme.md':
                          continue
                          
                      title = ""
                      with open(full_path, 'r', encoding='utf-8') as f:
                          content = f.read()
                      
                      match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
                      if match:
                          try:
                              fm_data = yaml.safe_load(match.group(1)) or {}
                              title = fm_data.get('title', '')
                          except Exception:
                              pass
                      
                      if not title:
                          title = file.replace('.md', '')

                      blog_slug = slugify(title)
                      clean_url = f'{BASE_URL}/blog/{blog_slug}/'
                      priority = '0.8'
                      changefreq = 'weekly'
                      
                      expected_html_path = os.path.join('blog', blog_slug, 'index.html')
                      if not os.path.exists(expected_html_path):
                          continue
                          
                      lastmod_date = get_git_lastmod(full_path)

                  elif file.endswith('.html'):
                      if file == '404.html':
                          continue

                      if relative_path.startswith('blog/') and relative_path != 'blog/index.html':
                          continue

                      if relative_path == 'index.html':
                          clean_url = f'{BASE_URL}/'
                          priority = '1.0'
                          changefreq = 'weekly'
                      elif relative_path.endswith('/index.html'):
                          folder_path = relative_path[:-11]
                          clean_url = f'{BASE_URL}/{folder_path}/'
                          priority = '0.8'
                          changefreq = 'weekly'
                      else:
                          html_path = relative_path[:-5]
                          clean_url = f'{BASE_URL}/{html_path}/'
                          priority = '0.8'
                          changefreq = 'weekly'
                          
                      lastmod_date = get_git_lastmod(full_path)
                  else:
                      continue

                  normalized_url = clean_url.strip().rstrip('/') + '/'

                  if normalized_url in unique_urls:
                      continue

                  unique_urls[normalized_url] = {
                      'loc': normalized_url,
                      'lastmod': lastmod_date,
                      'changefreq': changefreq,
                      'priority': priority
                  }

          sorted_urls = sorted(unique_urls.values(), key=lambda x: x['loc'])

          for item in sorted_urls:
              url_element = ET.SubElement(urlset, f'{{{NAMESPACE}}}url')
              
              loc_element = ET.SubElement(url_element, f'{{{NAMESPACE}}}loc')
              loc_element.text = item['loc']

              lastmod_element = ET.SubElement(url_element, f'{{{NAMESPACE}}}lastmod')
              lastmod_element.text = item['lastmod']

              changefreq_element = ET.SubElement(url_element, f'{{{NAMESPACE}}}changefreq')
              changefreq_element.text = item['changefreq']

              priority_element = ET.SubElement(url_element, f'{{{NAMESPACE}}}priority')
              priority_element.text = item['priority']

          raw_xml = ET.tostring(urlset, encoding='utf-8')
          parsed_xml = minidom.parseString(raw_xml)
          pretty_xml = parsed_xml.toprettyxml(indent='  ', encoding='utf-8')

          pretty_xml_clean = b'\n'.join(
              line for line in pretty_xml.splitlines()
              if line.strip()
          )

          old_content = b''
          if os.path.exists(SITEMAP_FILE):
              with open(SITEMAP_FILE, 'rb') as old_file:
                  old_content = old_file.read()

          if old_content == pretty_xml_clean:
              print('Sitemap already clean and up to date.')
              exit(0)

          with open(SITEMAP_FILE, 'wb') as sitemap_file:
              sitemap_file.write(pretty_xml_clean)

          print(f'Sitemap generated successfully with {len(sorted_urls)} unique URLs.')
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"

          git add sitemap.xml

          if git diff --cached --quiet; then
            echo "No sitemap changes detected."
            exit 0
          fi

          git commit -m "chore: auto-update sitemap.xml [skip ci]"
          git pull --rebase origin main
          git push origin main
