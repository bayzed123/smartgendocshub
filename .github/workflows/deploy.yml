name: Build and Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - 'blog-posts/**'
      - 'scripts/**'
      - 'assets/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Blog
        run: npm run build

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add blog/ .nojekyll
          git commit -m "chore: auto-generate blog content [skip ci]" || echo "No changes to commit"
          git push
